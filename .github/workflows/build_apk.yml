name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
      
      - name: Regenerate android folder
        run: |
          rm -rf android
          flutter create --org com.example --project-name ccc .
      
      - name: Add google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      
      - name: Add Firebase plugins
        run: |
          cat >> android/build.gradle.kts << 'EOF'
          
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.google.gms:google-services:4.4.1")
              }
          }
          EOF
          
          echo "" >> android/app/build.gradle.kts
          echo 'apply(plugin = "com.google.gms.google-services")' >> android/app/build.gradle.kts
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release --pub
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
