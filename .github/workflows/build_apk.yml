name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
      
      - name: Install dependencies
        run: flutter pub get
        
      - name: Prepare Project Structure
        run: |
          rm -rf android/
          mkdir -p lib
          mv main.dart lib/main.dart || true
          flutter create --project-name haway_app .
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle
          mkdir -p android/app/
          cp google-services.json android/app/google-services.json
        
      - name: Build APK
        run: flutter build apk --release
