name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
      
      - name: Create Clean Project
        run: |
          # 1. إنشاء مشروع جديد كلياً
          flutter create new_app
          cd new_app
          
          # 2. نقل ملفاتك إلى المشروع الجديد
          rm -rf lib/
          mkdir -p lib
          cp -r ../lib/* lib/ || true
          cp ../pubspec.yaml .
          
          # 3. إعداد Firebase
          mkdir -p android/app/
          cp ../google-services.json android/app/google-services.json
          
          # 4. تثبيت المكتبات والبناء
          flutter pub get
          flutter build apk --release
          
          # 5. نقل ملف الـ APK الناتج للمجلد الرئيسي
          cp build/app/outputs/flutter-apk/app-release.apk ../app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: app-release.apk
