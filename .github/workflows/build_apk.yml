name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
      
      - name: Backup and regenerate android folder
        run: |
          cp android/app/google-services.json /tmp/google-services.json
          rm -rf android
          flutter create --org com.example --project-name ccc .
          cp /tmp/google-services.json android/app/google-services.json
      
      - name: Add Firebase to build.gradle.kts
        run: |
          sed -i 's/id("com.android.application")/id("com.android.application")\n    id("com.google.gms.google-services")/' android/app/build.gradle.kts
          sed -i 's/id("com.android.application") version/id("com.google.gms.google-services") version "4.4.1" apply false\n    id("com.android.application") version/' android/build.gradle.kts
      
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
