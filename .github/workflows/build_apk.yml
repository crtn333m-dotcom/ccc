name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable

      - name: Regenerate android folder
        run: |
          rm -rf android
          flutter create --org com.example --project-name ccc .

      - name: Add google-services.json
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES" > android/app/google-services.json

      - name: Add Firebase plugins
        run: |
          cat >> android/build.gradle.kts << 'ENDOFFILE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.google.gms:google-services:4.4.1")
              }
          }
          ENDOFFILE
          echo "" >> android/app/build.gradle.kts
          echo 'apply(plugin = "com.google.gms.google-services")' >> android/app/build.gradle.kts

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
