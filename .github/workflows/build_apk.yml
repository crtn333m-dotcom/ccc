name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
      
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Setup
        run: |
          # تجهيز هيكل المشروع
          rm -rf android/
          mkdir -p lib
          mv main.dart lib/main.dart || true
          flutter create --project-name haway_app .
          
          # فرض إصدار SDK 34 في ملف gradle
          echo "android { compileSdk = 34 }" >> android/app/build.gradle
          
          # نسخ ملف الإعدادات
          mkdir -p android/app/
          cp google-services.json android/app/google-services.json
        
      - name: Build APK
        run: flutter build apk --release
