name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Build and Configure
        run: |
          # 1. تثبيت الحزم
          flutter pub get
          
          # 2. إنشاء مشروع أندرويد جديد لضمان توافق الملفات
          flutter create .
          
          # 3. فرض نسخة SDK 34 في ملف build.gradle
          # نستخدم echo لإضافة الإعداد مباشرة للسطر الذي يحدده Flutter
          echo "android { compileSdk = 34 }" >> android/app/build.gradle
          
          # 4. نسخ ملف Firebase
          mkdir -p android/app/
          cp google-services.json android/app/google-services.json
          
          # 5. البناء
          flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
