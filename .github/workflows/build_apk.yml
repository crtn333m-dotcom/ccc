name: Build Haway APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Clean Flutter Project
        run: |
          # إنشاء مشروع نظيف لتفادي تعارض الملفات الافتراضية
          flutter create haway_app
          # استبدال ملف الكود الافتراضي بكود تطبيق هواي الخاص بك
          cp main.dart haway_app/lib/main.dart

      - name: Build APK
        run: |
          cd haway_app
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: haway-release-apk
          path: haway_app/build/app/outputs/flutter-apk/app-release.apk
