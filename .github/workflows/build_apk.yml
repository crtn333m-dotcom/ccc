      - name: Prepare Project Structure
        run: |
          rm -rf android/
          mkdir -p lib
          mv main.dart lib/main.dart || true
          flutter create --project-name haway_app .
          # تحديث الإصدارات بشكل مباشر داخل ملف الإعدادات
          sed -i 's/compileSdk = .*/compileSdk = 34/g' android/app/build.gradle || true
          sed -i 's/targetSdk = .*/targetSdk = 34/g' android/app/build.gradle || true
          mkdir -p android/app/
          cp google-services.json android/app/google-services.json
